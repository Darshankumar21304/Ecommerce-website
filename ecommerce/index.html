<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-accent: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #212529; }
    .text-custom { color: var(--primary-accent) !important; }
    .btn-custom { background-color: var(--primary-accent); color: white; transition: 0.2s ease; border: none; }
    .btn-custom:hover { background-color: var(--primary-hover); color: white; }
    
    .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
    .product-image-container { overflow: hidden; height: 250px; }
    .product-image { transition: transform 0.5s ease; width: 100%; height: 100%; object-fit: cover; }
    .product-card:hover .product-image { transform: scale(1.05); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3 mb-5">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-dark text-decoration-none" href="index.html">Lumina</a>
      <div class="d-flex align-items-center ms-auto gap-4">
        <a class="text-custom fw-bold text-decoration-none" href="index.html">Shop</a>
        <a class="text-dark text-decoration-none" href="categories.html">Categories</a>
        <a class="text-dark text-decoration-none" href="about.html">About</a>
        <a href="cart.html" class="btn btn-light position-relative border-0 fw-bold">
          🛒 Cart
          <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h2 class="fw-bold mb-4">Featured Products</h2>
    <div class="row g-4">
      
      <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm product-card">
          <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="product-image" alt="Watch">
          </div>
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title fw-bold mb-0">Minimalist Watch</h6>
              <span class="badge bg-light text-dark border">⭐ 4.8</span>
            </div>
            <p class="text-muted small mb-3">Accessories</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-bold text-dark">₹199.00</span>
              <button class="btn btn-custom btn-sm px-3" onclick="addToCart('Minimalist Watch', 199, 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400')">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm product-card">
          <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="product-image" alt="Headphones">
          </div>
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title fw-bold mb-0">ANC Headphones</h6>
              <span class="badge bg-light text-dark border">⭐ 4.9</span>
            </div>
            <p class="text-muted small mb-3">Tech</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-bold text-dark">₹299.00</span>
              <button class="btn btn-custom btn-sm px-3" onclick="addToCart('ANC Headphones', 299, 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400')">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm product-card">
          <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" class="product-image" alt="T-Shirt">
          </div>
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h6 class="card-title fw-bold mb-0">Cotton T-Shirt</h6>
              <span class="badge bg-light text-dark border">⭐ 4.5</span>
            </div>
            <p class="text-muted small mb-3">Clothing</p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-bold text-dark">₹335.00</span>
              <button class="btn btn-custom btn-sm px-3" onclick="addToCart('Cotton T-Shirt', 35, 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400')">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    function updateBadge() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      let badge = document.getElementById('cart-badge');
      if (cart.length > 0) {
        badge.innerText = cart.length;
        badge.classList.remove('d-none');
      }
    }

    function addToCart(name, price, img) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({ name: name, price: price, img: img });
      localStorage.setItem('cart', JSON.stringify(cart));
      updateBadge();
      alert(name + " added to cart!");
    }

    updateBadge();
  </script>
</body>
</html>
