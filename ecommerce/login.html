<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* GLOBAL RESPONSIVE & DARK MODE CSS */
    :root { --primary-accent: #4f46e5; --primary-hover: #4338ca; --bg-body:#f8f9fa; --text-main:#212529; --card-bg:#fff; }
    [data-theme="dark"] { --bg-body:#121212; --text-main:#e0e0e0; --card-bg:#1e1e1e; }
    body, .card, .navbar, .form-control, a, button { transition: background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease !important; }
    body { background:var(--bg-body)!important; color:var(--text-main)!important; font-family: 'Inter', sans-serif; }
    .card, .navbar, .offcanvas, .dropdown-menu, .modal-content { background:var(--card-bg)!important; color:var(--text-main)!important; }
    .text-custom { color: var(--primary-accent) !important; }
    .btn-custom { background-color: var(--primary-accent); color: white; transition: 0.2s ease; border: none; }
    .btn-custom:hover { background-color: var(--primary-hover); color: white; }
    
    [data-theme="dark"] .text-dark { color: var(--text-main) !important; }
    [data-theme="dark"] .text-muted { color: #adb5bd !important; }
    [data-theme="dark"] .bg-light { background-color: #2a2a2a !important; color: var(--text-main) !important; border-color: #444 !important; }
    [data-theme="dark"] .form-control { background-color: #2a2a2a !important; color: var(--text-main) !important; border-color: #444 !important; }
    [data-theme="dark"] .form-control::placeholder { color: #888 !important; }

    @media (max-width: 991px) {
      .navbar-collapse { background: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: absolute; top: 100%; left: 10px; right: 10px; z-index: 1000; }
      [data-theme="dark"] .navbar-collapse { box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
      [data-theme="dark"] #mobile-menu-icon { color: var(--text-main) !important; }
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3 mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-dark text-decoration-none" href="index.html">Lumina</a>
      <button class="navbar-toggler border-0 shadow-none px-2" type="button" data-bs-toggle="collapse" data-bs-target="#luminaNav">
        <i class="bi bi-list fs-1 text-dark" id="mobile-menu-icon"></i>
      </button>
      <div class="collapse navbar-collapse" id="luminaNav">
        <div class="d-flex flex-column flex-lg-row align-items-center ms-auto gap-4 mt-4 mt-lg-0 pb-3 pb-lg-0">
          <a class="text-dark text-decoration-none fw-medium" href="index.html">Shop</a>
          <a class="text-dark text-decoration-none fw-medium" href="categories.html">Categories</a>
          <a class="text-dark text-decoration-none fw-medium" href="about.html">About</a>
          <a class="text-custom text-decoration-none fw-bold" href="login.html">Login</a>
          <a href="wishlist.html" class="text-dark text-decoration-none position-relative fw-bold mt-2 mt-lg-0">
            Wishlist <span id="wishlist-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
          </a>
          <div class="d-flex flex-wrap align-items-center gap-3 mt-2 mt-lg-0 justify-content-center">
            <a href="cart.html" class="btn btn-light position-relative border-0 fw-bold px-3">🛒 Cart <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span></a>
            <a class="text-dark text-decoration-none d-none d-lg-inline-block" href="profile.html"><i class="bi bi-person-circle fs-5"></i></a>
            <a class="text-dark text-decoration-none fw-medium d-lg-none" href="profile.html">Profile</a>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-circle px-2" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Dark Mode"><i id="theme-icon" class="bi bi-moon-fill"></i></button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card border-0 shadow-sm w-100 p-4 p-md-5" style="max-width: 450px; border-radius: 16px;">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-2 text-dark">Welcome Back</h2>
        <p class="text-muted">Sign in to continue to Lumina.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-floating mb-3">
          <input type="text" class="form-control bg-light border-0" id="fullName" placeholder="Full Name" required>
          <label for="fullName" class="text-muted">Full Name <span class="text-danger">*</span></label>
          <div class="invalid-feedback">Please enter your full name.</div>
        </div>
        <div class="form-floating mb-3">
          <input type="email" class="form-control bg-light border-0" id="email" placeholder="Email address" required>
          <label for="email" class="text-muted">Email address <span class="text-danger">*</span></label>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
        <div class="form-floating mb-3 position-relative">
          <input type="password" class="form-control bg-light border-0 pe-5" id="password" placeholder="Password" required>
          <label for="password" class="text-muted">Password <span class="text-danger">*</span></label>
          <button class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 text-muted" type="button" id="togglePassword">
            <i class="bi bi-eye-slash" id="toggleIcon"></i>
          </button>
          <div class="invalid-feedback">Please enter your password.</div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4 small">
          <a href="#" class="text-custom text-decoration-none fw-semibold">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-custom w-100 py-3 fw-bold mb-3 rounded-pill">Sign In</button>
        <p class="text-center text-muted small mb-0">Don't have an account? <a href="#" class="text-custom text-decoration-none fw-bold">Sign up</a></p>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="app.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    document.getElementById('togglePassword').addEventListener('click', function () {
      const p = document.getElementById('password'); const icon = document.getElementById('toggleIcon');
      p.setAttribute('type', p.getAttribute('type') === 'password' ? 'text' : 'password');
      icon.classList.toggle('bi-eye'); icon.classList.toggle('bi-eye-slash');
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const fn = document.getElementById('fullName'); const em = document.getElementById('email'); const pw = document.getElementById('password');
      fn.classList.remove('is-invalid'); em.classList.remove('is-invalid'); pw.classList.remove('is-invalid');
      
      let isValid = true;
      if (!fn.value.trim()) { fn.classList.add('is-invalid'); isValid = false; }
      if (!em.value || !em.value.includes('@')) { em.classList.add('is-invalid'); isValid = false; }
      if (!pw.value) { pw.classList.add('is-invalid'); isValid = false; }

      if (isValid) {
        localStorage.setItem('lumina_user', JSON.stringify({ fullName: fn.value.trim(), email: em.value.trim() }));
        
        // Ensure authentication flag is set for other pages (like app.js) to recognize the logged-in state
        localStorage.setItem('lumina_logged_in', 'true'); 
        
        Swal.fire({ title: 'Welcome Back!', text: 'Logging you in...', icon: 'success', showConfirmButton: false, timer: 1500, background: document.documentElement.getAttribute('data-theme') === 'dark' ? '#1e1e1e' : '#fff', color: document.documentElement.getAttribute('data-theme') === 'dark' ? '#e0e0e0' : '#212529' })
        .then(() => { window.location.href = 'profile.html'; });
      }
    });
  </script>
</body>
</html>
