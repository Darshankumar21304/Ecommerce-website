<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-accent: #4f46e5; }
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #212529; }
    .text-custom { color: var(--primary-accent) !important; }
    
    .category-card { transition: transform 0.3s ease, box-shadow 0.3s ease; border-radius: 12px; overflow: hidden; cursor: pointer; display: block; text-decoration: none;}
    .category-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important; }
    .category-image-container { position: relative; height: 350px; overflow: hidden; background-color: #000; }
    .category-image { transition: transform 0.6s ease; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
    .category-card:hover .category-image { transform: scale(1.08); opacity: 0.7; }
    .category-title { position: absolute; bottom: 30px; left: 30px; color: white; margin: 0; font-weight: 700; font-size: 1.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3 mb-5">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-dark text-decoration-none" href="index.html">Lumina</a>
      <div class="d-flex align-items-center ms-auto gap-4">
        <a class="text-dark text-decoration-none" href="index.html">Shop</a>
        <a class="text-custom fw-bold text-decoration-none" href="categories.html">Categories</a>
        <a class="text-dark text-decoration-none" href="about.html">About</a>
        <a href="cart.html" class="btn btn-light position-relative border-0 fw-bold">
          🛒 Cart
          <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="text-center mb-5">
      <h2 class="fw-bold mb-3">Shop by Category</h2>
      <p class="text-muted fs-5">Curated collections designed for your lifestyle.</p>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <a href="index.html" class="category-card shadow-sm">
          <div class="category-image-container">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" class="category-image" alt="Accessories">
            <h3 class="category-title">Accessories</h3>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="index.html" class="category-card shadow-sm">
          <div class="category-image-container">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" class="category-image" alt="Tech">
            <h3 class="category-title">Tech</h3>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="index.html" class="category-card shadow-sm">
          <div class="category-image-container">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" class="category-image" alt="Apparel">
            <h3 class="category-title">Apparel</h3>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="index.html" class="category-card shadow-sm">
          <div class="category-image-container">
            <img src="https://images.unsplash.com/photo-1558089687-f282ffcbc126?w=800" class="category-image" alt="Home">
            <h3 class="category-title">Home Office</h3>
          </div>
        </a>
      </div>
    </div>
  </main>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let badge = document.getElementById('cart-badge');
    if (cart.length > 0) {
      badge.innerText = cart.length;
      badge.classList.remove('d-none');
    }
  </script>
</body>
</html>
