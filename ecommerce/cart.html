<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina | Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-accent: #4f46e5; --primary-hover: #4338ca; }
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #212529; }
    .btn-custom { background-color: var(--primary-accent); color: white; transition: 0.2s ease; border: none; }
    .btn-custom:hover { background-color: var(--primary-hover); color: white; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm py-3 mb-5">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-dark text-decoration-none" href="index.html">Lumina</a>
      <div class="d-flex align-items-center ms-auto gap-4">
        <a class="text-dark text-decoration-none" href="index.html">Shop</a>
        <a class="text-dark text-decoration-none" href="categories.html">Categories</a>
        <a class="text-dark text-decoration-none" href="about.html">About</a>
        <a href="cart.html" class="btn btn-light position-relative border-0 fw-bold text-primary">
          🛒 Cart
          <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row">
      <div class="col-lg-8 mb-4">
        <h2 class="fw-bold mb-4">Shopping Cart</h2>
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4" id="cart-items"></div>
        </div>
      </div>
      
      <div class="col-lg-4 mt-5 pt-3">
        <div class="card border-0 shadow-sm bg-white p-4">
          <h5 class="fw-bold mb-4">Order Summary</h5>
          <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
            <span class="text-muted">Subtotal</span>
            <span id="cart-total" class="fw-bold">$0.00</span>
          </div>
          <button class="btn btn-custom w-100 py-3 fw-bold" onclick="alert('Proceeding to checkout!')">
            Checkout Now
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function renderCart() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      let container = document.getElementById('cart-items');
      let badge = document.getElementById('cart-badge');
      let total = 0;

      if (cart.length > 0) {
        badge.innerText = cart.length;
        badge.classList.remove('d-none');
      } else {
        badge.classList.add('d-none');
      }

      if (cart.length === 0) {
        container.innerHTML = "<p class='text-muted text-center py-4'>Your cart is empty.</p>";
        document.getElementById('cart-total').innerText = "$0.00";
        return;
      }

      let html = '';
      cart.forEach((item, index) => {
        total += item.price;
        html += `
          <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
            <img src="${item.img}" alt="${item.name}" class="rounded shadow-sm" style="width: 80px; height: 80px; object-fit: cover;">
            <div class="ms-4 flex-grow-1">
              <h6 class="fw-bold mb-1">${item.name}</h6>
              <span class="text-muted">$${item.price}</span>
            </div>
            <button class="btn btn-sm text-danger fw-bold" onclick="removeItem(${index})">Remove</button>
          </div>
        `;
      });

      container.innerHTML = html;
      document.getElementById('cart-total').innerText = "$" + total.toFixed(2);
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
